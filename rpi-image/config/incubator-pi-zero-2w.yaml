---
# rpi-image-gen configuration for Incubator v3 on Raspberry Pi Zero 2W
#
# Build prerequisites:
#   git clone https://github.com/raspberrypi/rpi-image-gen.git
#   cd rpi-image-gen && sudo ./install_deps.sh
#
# Build command (run from the rpi-image-gen checkout directory):
#   ./rpi-image-gen build \
#       -S /path/to/INCUBATOR_V3_DEV/rpi-image \
#       -c /path/to/INCUBATOR_V3_DEV/rpi-image/config/incubator-pi-zero-2w.yaml
#
# Output:  ./work/incubator-v3-pi-zero-2w/incubator-v3-pi-zero-2w.img
#
# Flash:
#   sudo rpi-imager --cli ./work/incubator-v3-pi-zero-2w/incubator-v3-pi-zero-2w.img /dev/mmcblk0

# ---------------------------------------------------------------------------
# Image identity
# ---------------------------------------------------------------------------
image_name: incubator-v3-pi-zero-2w
suite: bookworm
architecture: arm64

# ---------------------------------------------------------------------------
# Layers
# Run `rpi-image-gen layer --list` inside the rpi-image-gen directory to
# enumerate all built-in layers.  Our custom `incubator` layer is found
# automatically because the -S source directory adds its layer/ tree to the
# layer search path.
# ---------------------------------------------------------------------------
layers:
  # --- Raspberry Pi OS foundation ---
  - name: base              # Minimal Debian bookworm userspace
  - name: rpi-firmware      # GPU firmware, bootloader blobs
  - name: rpi-kernel        # Kernel + modules for Pi Zero 2W (BCM2710A1)
  - name: rpi-boot-config   # config.txt tuned for Pi Zero 2W

  # --- System services ---
  - name: networking        # NetworkManager + wpa_supplicant
  - name: ssh               # OpenSSH server (key-only auth)
  - name: ntp               # systemd-timesyncd / chrony

  # --- Custom application layer (found via -S source directory) ---
  - name: incubator

# ---------------------------------------------------------------------------
# Layer variables
# These can be overridden on the command line with -v KEY=VALUE
# ---------------------------------------------------------------------------
variables:
  # Default hostname written to /etc/hostname.  The firstboot script appends
  # the last 4 hex chars of the device ID so multiple units don't clash.
  INCUBATOR_HOSTNAME: incubator

  # Default locale and timezone baked into the image.
  LOCALE: en_US.UTF-8
  TIMEZONE: UTC

  # Git ref (tag, branch, or commit SHA) of the application to embed at
  # build time.  Set to "main" for the latest or a semver tag for a release.
  INCUBATOR_APP_GIT_REF: main

  # Remote repository URL.  The firstboot and OTA scripts use this to pull
  # updates.  Replace with your internal mirror for air-gapped environments.
  INCUBATOR_APP_REPO: https://github.com/angads22/incubator_v3_dev.git

  # Root filesystem size.  2 GB base + headroom for captures, models, logs.
  ROOTFS_SIZE: 4G
