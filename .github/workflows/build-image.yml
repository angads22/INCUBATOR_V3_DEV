name: Build SD image

# Manually triggered. Builds the flashable Pi image in the cloud and uploads it
# as a downloadable artifact — useful if you don't have a Linux machine to run
# build_image.sh on (e.g. Windows users): run this, then download + flash.
#
# Runs build_image.sh on a NATIVE arm64 runner. That's the whole trick: on real
# ARM hardware the in-image apt + pip install runs natively, with no QEMU. Every
# previous failure was QEMU corrupting the cross-arch build (apt exit 100 on
# ubuntu-24.04, exit 12 on ubuntu-22.04, a few minutes in). build_image.sh
# auto-detects aarch64 and skips emulation entirely, so the chroot just works.
on:
  workflow_dispatch:
    inputs:
      hostname:
        description: "Pi hostname"
        default: "incubator"
        required: false

jobs:
  build:
    # GitHub-hosted native arm64 runner — free for public repositories. No
    # emulation involved, so the build is both reliable and fast.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Show build host (expect aarch64)
        run: |
          echo "arch: $(uname -m)"   # must be aarch64 for a native, no-QEMU build
          df -h /

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          df -h /

      # build_image.sh downloads Raspberry Pi OS Lite (arm64), grows it, chroots
      # in (natively — no QEMU), runs init_pi.sh in IMAGE_BUILD mode, enables SSH,
      # and writes dist/incubator-v3-<version>-<date>.img.
      #
      # --grow 2048 adds just enough root-fs headroom for the pre-baked venv +
      # apt packages (~1 GB) while keeping the raw image small (~4.7 GB). The
      # filesystem auto-expands to fill the whole card on first boot, so nothing
      # is lost by keeping the image compact.
      #
      # --no-compress leaves a raw .img (NOT .img.xz). upload-artifact then zips
      # it exactly once, so the download is a plain .zip containing a single .img
      # — which Raspberry Pi Imager / balenaEtcher read and flash directly, with
      # no manual unzip. (Compressing to .img.xz first produced a confusing
      # .zip-of-.xz double nesting that tripped up the flashing tools.)
      - name: Build image
        run: sudo ./build_image.sh --hostname "${{ github.event.inputs.hostname }}" --grow 2048 --no-compress

      - name: Show built image size
        run: ls -lh dist/

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: incubator-sd-image
          path: dist/*.img
          retention-days: 14
          if-no-files-found: error
