name: Build SD image

# Manually triggered. Builds the flashable Pi image in the cloud and uploads it
# as a downloadable artifact — useful if you don't have a Linux machine to run
# build_image.sh on (e.g. Windows users): run this, then download + flash.
on:
  workflow_dispatch:
    inputs:
      hostname:
        description: "Pi hostname"
        default: "incubator"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          df -h /

      # Register arm64 emulation in the kernel (binfmt_misc) with the persistent
      # 'F' flag so it stays valid inside the chroot build_image.sh creates.
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Verify arm64 emulation is registered
        run: |
          ls -l /proc/sys/fs/binfmt_misc/qemu-aarch64*
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 || true

      - name: Build image
        run: sudo ./build_image.sh --hostname "${{ github.event.inputs.hostname }}"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: incubator-sd-image
          path: dist/*.img.xz
          retention-days: 14
          if-no-files-found: error
