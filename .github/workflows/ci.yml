name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  shell-syntax:
    name: Shell script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on all scripts
        run: |
          for s in build_image.sh init_pi.sh scripts/*.sh; do
            echo "checking $s"
            bash -n "$s"
          done

  tests:
    name: App tests (auth lifecycle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -q
