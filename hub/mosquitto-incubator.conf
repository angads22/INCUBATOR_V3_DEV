# Mosquitto config for the incubator fleet hub.
# Installed to /etc/mosquitto/conf.d/incubator.conf by setup-hub.sh.
#
# Units publish fleet/<device_id>/{status,temp,humidity} and subscribe to
# fleet/<device_id>/cmd (see app/services/fleet_service.py).

listener 1883

# Default: allow LAN clients without auth (the hub is on a trusted LAN and the
# only remote surface is your domain/reverse-proxy, gated separately).
# To require auth instead, create a password file and flip these:
#   sudo mosquitto_passwd -c /etc/mosquitto/incubator.passwd fleet
allow_anonymous true
# password_file /etc/mosquitto/incubator.passwd

# Keep retained status messages so a hub/portal restart sees last-known state.
persistence true
persistence_location /var/lib/mosquitto/
