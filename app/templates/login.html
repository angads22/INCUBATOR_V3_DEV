{% extends 'base.html' %}
{% block content %}
<section class="auth-wrap">
  <form id="login-form" class="card auth-card">
    <h2>Secure Operator Login</h2>
    <p class="muted">Sign in to access manual controls and configuration panels.</p>
    <label>Username<input name="username" required /></label>
    <label>Password<input name="password" type="password" required /></label>
    <button class="btn btn-primary" type="submit">Login</button>
    <p id="login-msg" class="hint"></p>
    {% if has_account %}
    <p class="muted"><a href="/reset-password">Forgot password?</a></p>
    {% else %}
    <p class="muted">No account yet? <a href="/onboarding">Run device setup</a> to create one.</p>
    {% endif %}
  </form>
</section>
{% endblock %}
{% block scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
