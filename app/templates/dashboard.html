{% extends 'base.html' %}
{% block content %}
<h1>Incubator Dashboard</h1>
<div class="grid">
  <section class="card">
    <h2>Environment</h2>
    <div class="metric"><span>Mode</span><strong id="mode">--</strong></div>
    <div class="metric"><span>Temp</span><strong id="temp">--</strong></div>
    <div class="metric"><span>Humidity</span><strong id="humidity">--</strong></div>
    <div class="metric"><span>Setpoint Temp</span><strong id="set-temp">--</strong></div>
    <div class="metric"><span>Setpoint RH</span><strong id="set-humidity">--</strong></div>
    <div class="metric"><span>Last Updated</span><strong id="last-updated">--</strong></div>
  </section>

  <section class="card">
    <h2>System State</h2>
    <div class="metric"><span>Heater</span><strong id="heater-state">--</strong></div>
    <div class="metric"><span>Fan</span><strong id="fan-state">--</strong></div>
    <div class="metric"><span>Turner</span><strong id="turner-state">--</strong></div>
    <div class="metric"><span>Hardware Link</span><strong id="hw-state">--</strong></div>
    <div class="metric"><span>Sensors</span><strong id="sensor-state">--</strong></div>
    <div class="metric"><span>Alarm State</span><strong id="alarm-state">--</strong></div>
    <div id="alarms" class="alarms"></div>
  </section>

  <section class="card wide">
    <h2>Manual Controls</h2>
    <div class="control-row">
      <button class="touch" onclick="toggleControl('heater', true)">Heater ON</button>
      <button class="touch muted" onclick="toggleControl('heater', false)">Heater OFF</button>
      <button class="touch" onclick="toggleControl('fan', true)">Fan ON</button>
      <button class="touch muted" onclick="toggleControl('fan', false)">Fan OFF</button>
      <button class="touch" onclick="runTurn()">Run Turn Cycle</button>
      <button class="touch muted" onclick="resetAlarm()">Reset Alarm</button>
    </div>
    <p id="control-msg" class="hint"></p>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>
  async function getJson(url) {
    const res = await fetch(url, {credentials: 'same-origin'});
    if (res.status === 401) {
      location.href = '/login';
      return null;
    }
    return res.json();
  }

  function onOff(v) { return v ? 'ON' : 'OFF'; }

  async function refreshDashboard() {
    const [status, env, mode] = await Promise.all([getJson('/api/status'), getJson('/api/environment'), getJson('/api/device-mode')]);
    if (!status || !env || !mode) return;

    document.getElementById('mode').textContent = mode.simulated_mode ? 'SIMULATED' : 'HARDWARE';
    document.getElementById('temp').textContent = `${env.temperature_c.toFixed(2)}°C`;
    document.getElementById('humidity').textContent = `${env.humidity_pct.toFixed(2)}%`;
    document.getElementById('set-temp').textContent = `${env.target_temp_c}°C`;
    document.getElementById('set-humidity').textContent = `${env.target_humidity_pct}%`;
    document.getElementById('last-updated').textContent = env.captured_at ? new Date(env.captured_at).toLocaleString() : 'No data yet';

    document.getElementById('heater-state').textContent = onOff(status.heater);
    document.getElementById('fan-state').textContent = onOff(status.fan);
    document.getElementById('turner-state').textContent = onOff(status.turner);
    document.getElementById('hw-state').textContent = status.hardware_online ? 'ONLINE' : 'OFFLINE';
    document.getElementById('sensor-state').textContent = status.sensor_online ? 'ONLINE' : 'OFFLINE';
    document.getElementById('alarm-state').textContent = status.state.toUpperCase();

    const alarmBox = document.getElementById('alarms');
    alarmBox.innerHTML = '';
    if (status.alarms.length) {
      status.alarms.forEach(msg => {
        const d = document.createElement('div');
        d.className = 'alarm';
        d.textContent = msg;
        alarmBox.appendChild(d);
      });
    }
  }

  async function toggleControl(name, enabled) {
    const res = await fetch(`/api/control/${name}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({enabled})
    });
    const data = await res.json();
    document.getElementById('control-msg').textContent = data.ok ? data.message : (data.error || 'Control failed');
    refreshDashboard();
  }

  async function runTurn() {
    const res = await fetch('/api/control/turn', {method: 'POST'});
    const data = await res.json();
    document.getElementById('control-msg').textContent = data.ok ? data.message : (data.error || 'Turn failed');
    refreshDashboard();
  }

  async function resetAlarm() {
    const res = await fetch('/api/control/reset-alarm', {method: 'POST'});
    const data = await res.json();
    document.getElementById('control-msg').textContent = data.ok ? data.message : (data.error || 'Reset failed');
    refreshDashboard();
  }

  refreshDashboard();
  setInterval(refreshDashboard, Number("{{ settings.get('refresh_interval_sec', '5') }}") * 1000);
</script>
{% endblock %}
