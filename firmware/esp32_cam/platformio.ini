[platformio]
default_envs = esp32cam

[env:esp32cam]
platform       = espressif32
board          = esp32cam
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600

; Partition scheme with large app space (no OTA) — needed for camera + WiFi
board_build.partitions = huge_app.csv

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    bblanchon/ArduinoJson@^7.3.0
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

; Release build: strip debug output, optimise for size
[env:esp32cam_release]
extends      = env:esp32cam
build_flags  =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -Os
